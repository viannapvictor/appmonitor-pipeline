# .github/workflows/ci.yml
name: Continuous Integration

on:
  push:
    branches: [ci/setup]
  pull_request:
    branches: [ci/setup]

env:
  ACTIONS_STEP_DEBUG: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate shell script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n status-check.sh

      - name: Aviso de boas-práticas
        run: echo "::warning::Lembre-se de versionar scripts Shell somente após testes locais."

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute tests
        id: test_step
        run: |
          echo "Running tests"
          exit 0

      - name: Falha nos testes
        if: failure()
        run: echo "::error::Alguns testes falharam. Verifique o relatório acima."

  package:
    name: Package report
    runs-on: ubuntu-latest
    needs: [validate, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create report.zip
        run: |
          zip -r report.zip . -x ".git/*"

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: report.zip

      - name: Publish job summary
        run: |
          {
            echo "## :clipboard: Job summary"
            echo ""
            echo "* **Runner OS** : \`$RUNNER_OS\`"
            echo "* **Branch**    : \`$GITHUB_REF_NAME\`"
            echo "* **Validate**  : ${{ needs.validate.result }}"
            echo "* **Test**      : ${{ needs.test.result }}"
            echo "* **Artefato**  : [report.zip](${{ steps.upload.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"